<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyAbroad Connect - Register</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

       .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 1000px;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            overflow: hidden;
        }

       .hero {
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), var(--bg-image);
            background-size: cover;
            background-position: center;
            color: white;
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

       .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }

       .hero p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 8px;
        }

       .country-badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            margin-top: 20px;
            font-weight: 600;
            backdrop-filter: blur(10px);
        }

       .form-section {
            padding: 60px 40px;
        }

       .form-section h2 {
            color: #333;
            margin-bottom: 8px;
            font-size: 1.8rem;
        }

       .subtitle {
            color: #666;
            margin-bottom: 32px;
        }

       .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 6px;
            color: #333;
            font-weight: 500;
            font-size: 0.9rem;
        }

        input, select {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            transition: border 0.3s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

       .row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

       .login-link {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 0.9rem;
        }

       .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
        }

        @media (max-width: 768px) {
           .container {
                grid-template-columns: 1fr;
            }
           .hero {
                padding: 40px 30px;
            }
           .form-section {
                padding: 40px 30px;
            }
           .row {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="hero" id="heroSection">
            <h1>Start Your Journey</h1>
            <p>Study at top universities worldwide</p>
            <p>Get visa help, scholarships & housing support</p>
            <div class="country-badge" id="countryBadge">📍 Loading...</div>
        </div>

        <div class="form-section">
            <h2>Create Account</h2>
            <p class="subtitle">Register to explore programs abroad</p>

            <form id="registerForm">
                <div class="row">
                    <div class="form-group">
                        <label for="firstName">First Name</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Last Name</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" required>
                </div>

                <div class="row">
                    <div class="form-group">
                        <label for="country">Preferred Country</label>
                        <select id="country" required>
                            <option value="">Select country</option>
                            <option value="UK">United Kingdom</option>
                            <option value="USA">United States</option>
                            <option value="Canada">Canada</option>
                            <option value="Germany">Germany</option>
                            <option value="Australia">Australia</option>
                            <option value="France">France</option>
                            <option value="Japan">Japan</option>
                            <option value="Netherlands">Netherlands</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="level">Study Level</label>
                        <select id="level" required>
                            <option value="">Select level</option>
                            <option value="undergrad">Undergraduate</option>
                            <option value="masters">Masters</option>
                            <option value="phd">PhD</option>
                            <option value="diploma">Diploma</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" minlength="8" required>
                </div>

                <button type="submit">Register for Free</button>

                <div class="login-link">
                    Already have an account? <a href="login.html">Log in</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Random featured country on page load
        const countries = [
            {
                name: "United Kingdom",
                image: "https://images.unsplash.com/photo-1513635269975-59663e0ac1ad?w=800",
                tagline: "Home to Oxford, Cambridge & 150+ top universities"
            },
            {
                name: "Canada",
                image: "https://images.unsplash.com/photo-1503614472-8c93d56e92ce?w=800",
                tagline: "Affordable tuition + post-study work permits"
            },
            {
                name: "Germany",
                image: "https://images.unsplash.com/photo-1467269204594-9661b134dd2b?w=800",
                tagline: "Tuition-free public universities for international students"
            },
            {
                name: "Australia",
                image: "https://images.unsplash.com/photo-1523482580672-f109ba8cb9be?w=800",
                tagline: "World-class research + amazing student cities"
            },
            {
                name: "United States",
                image: "https://images.unsplash.com/photo-1485738423138-0f7c76c02b5e?w=800",
                tagline: "4,000+ universities & flexible degree options"
            }
        ];

        // Set random country on load
        const randomCountry = countries[Math.floor(Math.random() * countries.length)];
        document.getElementById('heroSection').style.setProperty('--bg-image', `url(${randomCountry.image})`);
        document.getElementById('countryBadge').innerHTML = `📍 Featured: ${randomCountry.name}`;

        // Auto-fill the dropdown with random country
        document.getElementById('country').value = randomCountry.name.split(' ')[0];

        // Form handler
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('firstName').value;
            alert(`Welcome ${name}! Check your email to verify your StudyAbroad Connect account.`);
            // In real use: send data to your backend here
        });
    </script>
</body>
</html>
